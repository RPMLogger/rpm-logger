<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Red Pick Music — Lesson Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <img src="Portal Logo.png" alt="Red Pick Music">
    <div>
      <div class="header-title">RED PICK MUSIC</div>
      <div class="header-sub">Lesson Portal</div>
    </div>
  </div>

  <!-- SETTINGS MODAL -->
  <div class="settings-overlay" id="settingsOverlay" onclick="closeSettingsOutside(event)">
    <div class="settings-modal">
      <div class="settings-title">
        Settings
        <button class="settings-close" onclick="closeSettings()">✕</button>
      </div>
      <label class="settings-label">Apps Script URL</label>
      <input type="text" class="settings-input" id="scriptUrl" placeholder="Paste your Apps Script URL here..." />
      <button class="btn-settings-load" onclick="loadFromSettings()">⟳ Save & Load</button>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('lessons')">Lessons</button>
    <button class="tab-btn" onclick="switchTab('payments')">Payments</button>
    <button class="tab-btn" onclick="switchTab('past')">Past</button>
    <button class="tab-btn" onclick="switchTab('week')">Week</button>
    <button class="tab-btn" onclick="switchTab('general')">General</button>
    <button class="tab-btn" onclick="switchTab('financial')">Financial</button>
    <button class="tab-btn" onclick="switchTab('inquiries')">Inquiries<span class="inq-badge" id="inqBadge" style="display:none"></span></button>
  </div>

  <!-- LESSONS -->
  <div class="tab-panel active" id="tab-lessons">
    <div class="section-label">This Week</div>
    <div class="week-pills" id="weekPills"><div style="color:var(--muted);font-size:11px">Loading...</div></div>
    <hr class="divider">
    <div class="section-label" id="todayLabel">Today</div>
    <div class="today-grid" id="todayGrid"><div class="empty-state">Loading...</div></div>
    <div class="log-panel" id="logPanel">
      <div class="log-panel-header">
        <div class="log-panel-name" id="logPanelName">—</div>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="log-panel-status idle" id="logPanelStatus">ready</div>
          <button onclick="closeLogPanel()" style="background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;line-height:1;padding:0 2px;" title="Close">✕</button>
        </div>
      </div>
      <div class="log-rows" id="logRows">
<textarea class="transcript-box transcript-row active" id="rowInput-0" ...
<textarea class="transcript-box transcript-row"        id="rowInput-1" ...
<textarea class="transcript-box transcript-row"        id="rowInput-2" ...
      </div>
      <div class="log-actions" id="logActions">
        <button class="btn-log" id="btnLog" onclick="submitLog()" disabled>Log It →</button>
      </div>
    </div>
    <div class="log-feed" id="lessonFeed"></div>
    <hr class="divider">
    <button class="refresh-btn" onclick="loadData()">⟳ Refresh</button>
  </div>

  <!-- PAYMENTS -->
  <div class="tab-panel" id="tab-payments">
    <button class="btn-manual-entry" onclick="openManualEntryModal()">Cash Payment</button>
    <div class="section-label" style="margin-top:20px;margin-bottom:10px">
      Incoming <span style="color:var(--blue)">Venmo &amp; Zelle</span>
    </div>
    <div id="incomingPayments"><div style="color:var(--muted);font-size:11px">Loading...</div></div>
    <div class="log-feed" id="paymentFeed"></div>
    <hr class="divider" style="margin-top:24px">
    <button id="btnPayHistory" class="btn-pay-history" onclick="togglePaymentHistory()">▾ View Payment History</button>
    <div id="payHistorySection">
      <div id="payHistoryList"></div>
    </div>
  </div>

  <!-- MANUAL ENTRY MODAL -->
  <div class="settings-overlay" id="manualEntryModal" onclick="closeManualEntryOutside(event)">
    <div class="settings-modal">
      <div class="settings-title">
        Cash Payment
        <button class="settings-close" onclick="closeManualEntryModal()">✕</button>
      </div>
      <div id="manualStudentPills" class="student-pills-wrap"></div>
      <div id="cashLogPanel">
        <div class="cash-log-name" id="cashLogName"></div>
        <input id="cashDate"   class="cash-input" type="text" placeholder="Date — e.g. May 20">
        <input id="cashAmount" class="cash-input" type="text" placeholder="Amount" value="$380">
        <input id="cashNotes"  class="cash-input" type="text" placeholder="Notes (optional)">
        <button id="btnCashLog" class="btn-log" onclick="submitCashLog()">Log Payment →</button>
      </div>
    </div>
  </div>

  <!-- PAST -->
  <div class="tab-panel" id="tab-past">
    <div id="pastTodaySection" style="display:none">
      <div class="section-label" id="pastTodayLabel">Today</div>
      <div class="today-grid" id="pastTodayGrid"></div>
      <hr class="divider">
    </div>
    <div id="pastHeader" style="display:none; margin-bottom:12px;">
      <span id="pastHeaderName" style="font-family:'Syne',sans-serif;font-size:17px;font-weight:400;"></span>
    </div>
    <div class="past-lessons-list" id="pastList"></div>
  </div>

  <!-- WEEK -->
  <div class="tab-panel" id="tab-week">
    <div class="week-tab-header" id="weekTabHeader"></div>
    <div class="week-tab-grid" id="weekTabGrid"><div class="empty-state">Loading...</div></div>
  </div>

  <!-- GENERAL -->
  <div class="tab-panel" id="tab-general">
    <div class="section-label">Student Load</div>
    <div class="load-table" id="loadTable">
      <div class="load-row"><div class="load-label">Student #</div><div class="load-value" id="loadTotal">—</div></div>
      <div class="load-row highlight"><div class="load-label">Normalized #</div><div class="load-value" id="loadNorm">—</div></div>
      <div class="load-row"><div class="load-label">Weekly #</div><div class="load-value" id="loadWeekly">—</div></div>
      <div class="load-row"><div class="load-label">Biweekly #</div><div class="load-value" id="loadBiweekly">—</div></div>
      <div class="load-row income"><div class="load-label">Total Income</div><div class="load-value" id="loadIncome">—</div></div>
      <div class="load-row income"><div class="load-label">Gregorian Income</div><div class="load-value" id="loadGregorian">—</div></div>
    </div>
    <div class="section-label" style="margin-top:20px">Student List</div>
    <div class="load-table" id="studentListTable" style="display:none">
      <div class="load-row" style="background:var(--surface2)">
        <div class="load-label" style="flex:1">Name</div>
        <div class="load-label" style="width:60px;text-align:center">Ave.</div>
        <div class="load-label" style="width:60px;text-align:right">Rate</div>
      </div>
      <div id="studentListRows"></div>
      <div class="load-row" style="background:var(--surface2)">
        <div class="load-label" style="flex:1;color:var(--text)">TOTAL</div>
        <div class="load-value" id="listNormTotal" style="width:60px;text-align:center;font-size:13px;color:var(--accent2)">—</div>
        <div style="width:60px"></div>
      </div>
    </div>
    <div class="log-feed" id="generalFeed"></div>
  </div>

  <!-- FINANCIAL -->
  <div class="tab-panel" id="tab-financial">
    <div class="financial-empty">Financial tracking<br>coming soon</div>
  </div>

  <!-- INQUIRIES -->
  <div class="tab-panel" id="tab-inquiries">
    <div class="section-label">Trial Lesson Inquiries</div>
    <div id="inquiriesList"><div class="inq-empty">Loading...</div></div>
  </div>

  <!-- GEAR BUTTON -->
  <div style="display:flex; justify-content:flex-end; margin-top:32px; padding-bottom:16px;">
    <button class="gear-btn" onclick="openSettings()" title="Settings">⚙</button>
  </div>

</div>

<!-- ─── CORE (load first) ─────────────────────────────────────────────────── -->
<script src="core/state.js"></script>
<script src="core/storage.js"></script>
<script src="core/utils.js"></script>
<script src="core/api.js"></script>

<!-- ─── TABS ─────────────────────────────────────────────────────────────── -->
<script src="tabs/lessons.js"></script>
<script src="tabs/payments.js"></script>
<script src="tabs/past.js"></script>
<script src="tabs/week.js"></script>
<script src="tabs/general.js"></script>
<script src="tabs/financial.js"></script>
<script src="tabs/inquiries.js"></script>

<!-- ─── INIT ─────────────────────────────────────────────────────────────── -->
<script>
  function openSettings() { document.getElementById("settingsOverlay").classList.add("open"); }
  function closeSettings() { document.getElementById("settingsOverlay").classList.remove("open"); }
  function closeSettingsOutside(e) { if (e.target === document.getElementById("settingsOverlay")) closeSettings(); }
  function loadFromSettings() {
    var url = document.getElementById("scriptUrl").value.trim();
    if (!url) return;
    localStorage.setItem("scriptUrl", url);
    closeSettings();
    loadData();
  }

  function closeManualEntryOutside(e) {
    if (e.target === document.getElementById("manualEntryModal")) closeManualEntryModal();
  }

  function switchTab(tab) {
    if (isRecording) stopRecording();
    var tabs = ["lessons","payments","past","week","general","financial","inquiries"];
    tabs.forEach(function(t, i) {
      document.getElementById("tab-" + t).classList.toggle("active", t === tab);
      document.querySelectorAll(".tab-btn")[i].classList.toggle("active", t === tab);
    });
    if (tab === "payments") loadIncomingPayments();
  }

  var _now = new Date();
  var _DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  var _MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var _todayStr = _DAYS[_now.getDay()] + " · " + _MONTHS[_now.getMonth()] + " " + _now.getDate();
  document.getElementById("todayLabel").textContent = _todayStr;
  document.getElementById("pastTodayLabel").textContent = _todayStr;

  var _saved = localStorage.getItem("scriptUrl");
  if (_saved) document.getElementById("scriptUrl").value = _saved;
  document.getElementById("scriptUrl").addEventListener("change", function() {
    localStorage.setItem("scriptUrl", this.value);
  });

  window.onload = function() {
    var url = localStorage.getItem("scriptUrl");
    if (url) { document.getElementById("scriptUrl").value = url; loadData(); }
  };
</script>

</body>
</html>
